    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0c0c0c;
      --text: #f0ece4;
      --text-muted: #8a8578;
      --accent: #c9a96e;
    }

    html, body {
      height: 100%;
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      text-align: center;
      padding: 24px;
      max-width: 380px;

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;

      letter-spacing: .15em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeIn .6s ease .1s forwards;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid rgba(201,169,110,.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 0 auto 28px;
      animation: spin .8s linear infinite;
    }

    .message {
      font-size: 15px;
      font-weight: 300;
      line-height: 1.6;
      color: var(--text-muted);
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeIn .6s ease .3s forwards;
    }

    .fallback {
      display: none;
    }

    .fallback.visible {
      display: block;
      opacity: 0;
      animation: fadeIn .5s ease forwards;
    }

    .fallback-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(201,169,110,.3);
      padding-bottom: 2px;
      transition: border-color .2s;
    }

    .fallback-link:active {
      border-color: var(--accent);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

<div class="wrap">

  <p class="message" id="message">Переходим в каталог...</p>

  <div class="fallback" id="fallback">
    <a class="fallback-link" id="fallbackLink" href="https://vk.me/nativomebel">
      Открыть каталог вручную →
    </a>
  </div>
</div>

<script>
  // Читаем _ym_uid из куки
  function getYmUid() {
    var match = document.cookie.match('(?:^|;)\\s*_ym_uid=([^;]*)');
    return match ? decodeURIComponent(match[1]) : '';
  }

  // Строим ссылку на ВК с ref = _ym_uid
  function buildVkUrl(ymUid) {
    var base = 'https://vk.me/nativomebel';
    return ymUid ? base + '?ref=' + encodeURIComponent(ymUid) : base;
  }

  // Показываем fallback-ссылку
  function showFallback(url) {
    var fb = document.getElementById('fallback');
    var link = document.getElementById('fallbackLink');
    link.href = url;
    fb.classList.add('visible');
  }

  // Редирект
  function doRedirect(ymUid) {
    if (typeof ym !== 'undefined') {
      ym(109106428, 'reachGoal', 'vk_click');
    }

    var url = buildVkUrl(ymUid);
    document.getElementById('fallbackLink').href = url;

    // Задержка 500мс чтобы Метрика отправила данные
    setTimeout(function() {
      window.location.href = url;

      // Если через 3 секунды ещё здесь — показываем ссылку
      setTimeout(function() {
        showFallback(url);
      }, 3000);
    }, 500);
  }

  // Ждём появления _ym_uid в куках (макс 4 сек)
  var attempts = 0;
  var maxAttempts = 20; // 20 × 200мс = 4 секунды

  function tryRedirect() {
    attempts++;
    var ymUid = getYmUid();

    if (ymUid) {
      doRedirect(ymUid);
      return;
    }

    if (attempts >= maxAttempts) {
      // Кука не появилась — редиректим без неё
      doRedirect('');
      return;
    }

    setTimeout(tryRedirect, 200);
  }

  // Запускаем после загрузки
  if (document.readyState === 'complete') {
    tryRedirect();
  } else {
    window.addEventListener('load', tryRedirect);
  }
</script>
